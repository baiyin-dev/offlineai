<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline AI Photo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: linear-gradient(160deg, #f8f9fc 0%, #eef1f8 50%, #e8ecf4 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    main {
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .icon {
      width: 120px;
      height: 120px;
      border-radius: 26px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      margin-bottom: 1.75rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    .intro {
      font-size: 1.05rem;
      color: #444;
      text-align: left;
    }

    .intro p + p {
      margin-top: 1rem;
    }

    .intro strong {
      color: #1a1a1a;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <img
      class="icon"
      src="app_icon_1024.webp"
      alt="LocalAI app icon"
    >

    <h1>LocalAI: Stable Diffusion</h1>

    <div class="intro">
      <p>
      A real private AI APP, only use your iPhone’s chip to generate image.
      </p>
      <p>
      No remote service, No fee.
      </p>
      <p>
      Generate anything you can imagine.
      </p>
      <br>
      <br>
      <p>
      If you have any question, please e-mail me.
      </p>
      <p>
      Support:  baiyin0203@126.com
      </p>
    </div>
  </main>
</body>
</html>
